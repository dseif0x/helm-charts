apiVersion: apps/v1
kind: Deployment
metadata:
  name: ccs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ccs
  template:
    metadata:
      labels:
        app: ccs
    spec:
      containers:
      - image: {{ .Values.image }}
        imagePullPolicy: Always
        name: ccs
        ports:
        - containerPort: 3000
          protocol: TCP
          name: http
        volumeMounts:
        - name: ccs-storage
          mountPath: /app/configs
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      volumes:
        - name: ccs-storage
          persistentVolumeClaim:
            claimName: ccs-data
---
kind: Service
apiVersion: v1
metadata:
  name: ccs-svc
spec:
  type: ClusterIP
  selector:
    app: ccs
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 3000