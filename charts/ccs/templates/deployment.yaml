apiVersion: apps/v1
kind: Deployment
metadata:
  name: ccs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ccs
  template:
    metadata:
      labels:
        app: ccs
    spec:
      containers:
      - image: {{ .Values.image }}
        imagePullPolicy: Always
        name: ccs
        ports:
        - containerPort: 3000
          protocol: TCP
          name: http
        env:
        - name: CCS_PORT
          value: "3000"
        volumeMounts:
        - name: ccs-storage
          mountPath: /home/node/.ccs
        - name: ccs-storage-claude
          mountPath: /home/node/.claude
        - name: ccs-storage-opencode
          mountPath: /home/node/.opencode
        - name: ccs-storage-grok
          mountPath: /home/node/.grok-cli
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      volumes:
        - name: ccs-storage
          persistentVolumeClaim:
            claimName: ccs-data
        - name: ccs-storage-claude
          persistentVolumeClaim:
            claimName: ccs-data-claude
        - name: ccs-storage-opencode
          persistentVolumeClaim:
            claimName: ccs-data-opencode
        - name: ccs-storage-grok
          persistentVolumeClaim:
            claimName: ccs-data-grok
---
kind: Service
apiVersion: v1
metadata:
  name: ccs-svc
spec:
  type: ClusterIP
  selector:
    app: ccs
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 3000