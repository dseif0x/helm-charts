apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiclient2api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiclient2api
  template:
    metadata:
      labels:
        app: aiclient2api
    spec:
      containers:
      - image: {{ .Values.image }}
        imagePullPolicy: Always
        name: aiclient2api
        ports:
        - containerPort: 3000
          protocol: TCP
          name: http
        volumeMounts:
        - name: aiclient2api-storage
          mountPath: /app/configs
        resources:
          requests:
            memory: "100Mi"
            cpu: "100m"
          limits:
            memory: "200Mi"
            cpu: "200m"
      volumes:
        - name: aiclient2api-storage
          persistentVolumeClaim:
            claimName: aiclient2api-data
---
kind: Service
apiVersion: v1
metadata:
  name: aiclient2api-svc
spec:
  type: ClusterIP
  selector:
    app: aiclient2api
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 3000